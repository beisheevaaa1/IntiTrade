services:
  postgres:
    image: postgres:16-alpine
    container_name: university_marketplace_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: university_marketplace
      POSTGRES_USER: marketplace
      POSTGRES_PASSWORD: marketplace
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
