services:
  postgres:
    image: postgres:16-alpine
    container_name: university_marketplace_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: university_marketplace
      POSTGRES_USER: marketplace
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD to a strong local secret}"
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
